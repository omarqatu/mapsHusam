<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السجلات - نظام الفلترة المتقدم</title>

    <!-- 🔒 حارس الوصول: يمنع عرض الصفحة لأي شخص غير مسجل كمشرف -->
    <style id="access-guard-style">
        html { visibility: hidden; }
    </style>
    <script>
    (function () {
        function getStoredUser() {
            try {
                return JSON.parse(localStorage.getItem('map_user')) ||
                       JSON.parse(sessionStorage.getItem('map_user')) ||
                       JSON.parse(localStorage.getItem('user')) ||
                       JSON.parse(sessionStorage.getItem('user'));
            } catch (e) {
                return null;
            }
        }

        var user = getStoredUser();
        if (!user || user.role !== 'admin') {
            window.location.replace('/index.html');
        } else {
            document.addEventListener('DOMContentLoaded', function () {
                document.documentElement.style.visibility = 'visible';
            });
        }
    })();
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السجلات - نظام الفلترة المتقدم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { width: 95%; max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 25px; }

        /* Responsive للكمبيوتر والموبايل */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { width: 100%; padding: 15px; border-radius: 10px; }
            h1 { font-size: 20px; margin-bottom: 15px; }
        }

        @media (max-width: 480px) {
            body { padding: 0; margin: 0; }
            .container { width: 100%; padding: 10px; border-radius: 0; box-shadow: none; min-height: 100vh; }
            h1 { font-size: 18px; margin-bottom: 10px; padding: 0 10px; }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            body { padding: 0; margin: 0; }
            .container { width: 100%; padding: 10px; border-radius: 0; box-shadow: none; min-height: 100vh; }
            h1 { font-size: 16px; margin-bottom: 10px; padding: 0 10px; }
        }

        /* تنسيق الجدول */
        .table-container { overflow-x: auto; border-radius: 10px; border: 1px solid #e0e0e0; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background-color: #1a73e8; color: white; padding: 15px; font-size: 14px; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        tr:hover { background-color: #f8f9fa; }

        /* صف الفلاتر المتقدم */
        .filter-row { background-color: #f8f9fb; }
        .filter-row th { padding: 10px 5px; background-color: #f8f9fb; border-bottom: 2px solid #1a73e8; }

        .filter-group { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .filter-input, .filter-select { 
            width: 90%; 
            padding: 6px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 11px; 
            outline: none;
            transition: all 0.3s;
            background: white;
        }
        .filter-input:focus, .filter-select:focus { border-color: #1a73e8; box-shadow: 0 0 5px rgba(26,115,232,0.2); }

        /* أزرار التحكم والصفحات */
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        /* شريط التنقل الذكي */
        .pagination-wrapper { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; flex-wrap: wrap; gap: 20px; background: #fafafa; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .page-size-selector { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #333; font-weight: bold; }
        .page-size-select { padding: 6px 12px; border: 1px solid #ccc; border-radius: 5px; outline: none; background: white; cursor: pointer; font-weight: bold; color: #1a73e8; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; }
        .page-btn { background: #1a73e8; color: white; border: none; padding: 8px 14px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .page-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* أزرار أرقام الصفحات */
        .page-num-btn { background: white; color: #1a73e8; border: 1px solid #e0e0e0; padding: 8px 14px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.3s; font-size: 13px; }
        .page-num-btn:hover { background: #e8f0fe; border-color: #1a73e8; }
        .page-num-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; box-shadow: 0 4px 10px rgba(26,115,232,0.3); }

        .delete-btn { background: #d93025; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .delete-btn:hover { background: #a51d14; }
        .refresh-btn { background: #34a853; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; }

        small { color: #666; font-family: monospace; font-size: 10px; }
        .no-data { padding: 40px; text-align: center; color: #999; font-style: italic; }
        .badge-count { font-weight: bold; color: #1a73e8; background: #e8f0fe; padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-chart-line"></i> لوحة إدارة السجلات الذكية</h1>

    <div class="header-actions">
        <button class="refresh-btn" onclick="resetFiltersAndLoad()"><i class="fas fa-sync-alt"></i> إعادة تعيين الفلاتر والتحميل</button>
        <button class="refresh-btn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" onclick="window.open('notifications-panel.html', '_blank')">
            <i class="fas fa-bell"></i> إرسال إشعار
        </button>
        <button class="refresh-btn" style="background: linear-gradient(135deg, #34a853 0%, #1e7e34 100%);" onclick="window.open('admin-users.html', '_blank')">
            <i class="fas fa-users-cog"></i> إدارة المستخدمين
        </button>
        <div id="statsInfo">
            <span id="totalInfo" class="badge-count"></span>
        </div>
    </div>

    <div class="table-container">
        <table id="logsTable">
            <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>اسم المستخدم</th>
                    <th>رقم الموبايل</th>
                    <th>اسم المزود</th>
                    <th>نوع الخدمة</th>
                    <th>الوقت والتاريخ</th>
                    <th style="width: 80px;">إجراءات</th>
                </tr>
                <tr class="filter-row">
                    <th>
                        <div class="filter-group">
                            <input type="text" class="filter-input" data-col="id" placeholder="ID">
                        </div>
                    </th>
                    <th>
                        <div class="filter-group">
                            <input type="text" class="filter-input" data-col="user_name" placeholder="بحث بالاسم...">
                            <select class="filter-select" data-col="user_name"><option value="">الكل</option></select>
                        </div>
                    </th>
                    <th>
                        <div class="filter-group">
                            <input type="text" class="filter-input" data-col="user_phone" placeholder="بحث بالرقم...">
                        </div>
                    </th>
                    <th>
                        <div class="filter-group">
                            <input type="text" class="filter-input" data-col="provider_name" placeholder="بحث...">
                            <select class="filter-select" data-col="provider_name"><option value="">الكل</option></select>
                        </div>
                    </th>
                    <th>
                        <div class="filter-group">
                            <input type="text" class="filter-input" data-col="service_type" placeholder="بحث...">
                            <select class="filter-select" data-col="service_type"><option value="">الكل</option></select>
                        </div>
                    </th>
                    <th>
                        <div class="filter-group">
                            <input type="text" class="filter-input" data-col="formatted_date" placeholder="بحث بالتاريخ...">
                            <select class="filter-select" data-col="formatted_date" data-type="date-only"><option value="">الكل</option></select>
                        </div>
                    </th>
                    <th><i class="fas fa-filter" style="color: #1a73e8;"></i></th>
                </tr>
            </thead>
            <tbody id="logsBody"></tbody>
        </table>
    </div>

    <div class="pagination-wrapper">
        <div class="page-size-selector">
            <label><i class="fas fa-list-ol"></i> عدد السجلات لكل صفحة:</label>
            <select id="pageSizeSelect" class="page-size-select" onchange="changePageSize(this.value)">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>

        <div class="pagination">
            <button id="prevGroupBtn" class="page-btn" onclick="changePageGroup(-1)" title="10 صفحات للخلف"><i class="fas fa-angle-double-right"></i></button>
            <button id="prevBtn" class="page-btn" onclick="changePage(-1)"><i class="fas fa-chevron-right"></i> السابق</button>

            <div id="pageNumbers" style="display: flex; gap: 6px; align-items: center; margin: 0 5px;"></div>

            <button id="nextBtn" class="page-btn" onclick="changePage(1)">التالي <i class="fas fa-chevron-left"></i></button>
            <button id="nextGroupBtn" class="page-btn" onclick="changePageGroup(1)" title="10 صفحات للأمام"><i class="fas fa-angle-double-left"></i></button>
        </div>

        <span id="pageIndicator" style="font-weight: bold; color: #555; font-size: 13px;">صفحة 1 من 1</span>
    </div>
</div>

<script>
    let currentPage = 1;
    let totalPages = 1;
    let allData = []; 
    let pageSize = 20; 

    async function loadLogs(page) {
        const tbody = document.getElementById('logsBody');
        try {
            // السيرفر مبرمج خارجياً لإرجاع 10 سجلات كحد أقصى في كل طلب صفحة
            const backendPageSize = 10; 

            // حساب نطاق الصفحات الخلفية المطلوب جلبها لتغطية العدد المحدد في الواجهة الأمامية
            const startBackendPage = Math.floor(((page - 1) * pageSize) / backendPageSize) + 1;
            const endBackendPage = Math.floor(((page * pageSize) - 1) / backendPageSize) + 1;

            let fetchedData = [];
            let totalRecords = 0;
            const fetchPromises = [];

            // تجهيز الطلبات المتوازية لجمع السجلات المطلوبة دفعة واحدة
            for (let bp = startBackendPage; bp <= endBackendPage; bp++) {
                fetchPromises.push(
                    fetch(`/api/stats-detailed?page=${bp}&limit=${backendPageSize}&t=${Date.now()}`).then(res => res.json())
                );
            }

            // تنفيذ جلب البيانات بالتوازي لسرعة فائقة في الاستجابة
            const results = await Promise.all(fetchPromises);

            results.forEach(result => {
                if (result && result.data) {
                    fetchedData = fetchedData.concat(result.data);
                }
                if (result && result.totalRecords && totalRecords === 0) {
                    totalRecords = result.totalRecords;
                }
            });

            allData = fetchedData;
            currentPage = page;

            // حساب إجمالي عدد الصفحات بناءً على الـ pageSize الفعلي المحدد
            if (totalRecords) {
                totalPages = Math.ceil(totalRecords / pageSize);
            } else {
                const serverTotalPages = results[0]?.totalPages || 1;
                totalPages = Math.ceil((serverTotalPages * backendPageSize) / pageSize) || 1;
            }

            updateFilterOptions(allData);
            applyFilters();
            renderPaginationControls();

            document.getElementById('totalInfo').innerText = `إجمالي السجلات: ${totalRecords || allData.length}`;

        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="7" class="no-data">خطأ في الاتصال بالسيرفر</td></tr>';
        }
    }

    function renderPaginationControls() {
        const pageNumbersContainer = document.getElementById('pageNumbers');
        pageNumbersContainer.innerHTML = '';

        const blockSize = 10; 
        const currentBlock = Math.ceil(currentPage / blockSize);
        const startPage = (currentBlock - 1) * blockSize + 1;
        const endPage = Math.min(startPage + blockSize - 1, totalPages);

        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.className = `page-num-btn ${i === currentPage ? 'active' : ''}`;
            btn.innerText = i;
            btn.onclick = () => loadLogs(i);
            pageNumbersContainer.appendChild(btn);
        }

        document.getElementById('pageIndicator').innerText = `صفحة ${currentPage} من ${totalPages}`;

        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages || totalPages === 0);

        document.getElementById('prevGroupBtn').disabled = (startPage === 1);
        document.getElementById('nextGroupBtn').disabled = (endPage === totalPages || totalPages === 0);
    }

    function changePageGroup(direction) {
        const blockSize = 10;
        const currentBlock = Math.ceil(currentPage / blockSize);
        let newPage;

        if (direction === -1) {
            newPage = (currentBlock - 2) * blockSize + 1;
        } else {
            newPage = currentBlock * blockSize + 1;
        }

        if (newPage >= 1 && newPage <= totalPages) {
            loadLogs(newPage);
        }
    }

    function changePageSize(size) {
        pageSize = parseInt(size);
        loadLogs(1);
    }

    function updateFilterOptions(data) {
        const columns = ['user_name', 'provider_name', 'service_type', 'formatted_date'];

        columns.forEach(col => {
            const select = document.querySelector(`.filter-select[data-col="${col}"]`);
            if (!select) return;
            const currentValue = select.value;

            let uniqueValues;

            if (select.getAttribute('data-type') === 'date-only') {
                uniqueValues = [...new Set(data.map(item => item[col] ? item[col].split(' ')[0] : ''))].filter(Boolean).sort().reverse();
            } else {
                uniqueValues = [...new Set(data.map(item => item[col]))].filter(Boolean).sort();
            }

            select.innerHTML = '<option value="">الكل</option>';
            uniqueValues.forEach(val => {
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = val;
                select.appendChild(opt);
            });
            select.value = currentValue;
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById('logsBody');
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="no-data">لا توجد نتائج تطابق الفلاتر المختارة</td></tr>';
            return;
        }

        data.forEach(row => {
            const tr = document.createElement('tr');
            const displayName = row.user_name && row.user_name !== row.user_identifier 
                ? row.user_name 
                : (row.user_identifier || '---');
            const displayPhone = row.user_phone && row.user_phone !== '---' 
                ? row.user_phone 
                : '---';
            tr.innerHTML = `
                <td>${row.id}</td>
                <td><b>${displayName}</b></td>
                <td><small style="direction:ltr; display:inline-block;">${displayPhone}</small></td>
                <td><b>${row.provider_name}</b></td>
                <td><span style="color:#1a73e8; font-weight:bold;">${row.service_type}</span></td>
                <td>${row.formatted_date}</td>
                <td>
                    <button class="delete-btn" onclick="deleteRecord(${row.id})">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function applyFilters() {
        const inputs = document.querySelectorAll('.filter-input');
        const selects = document.querySelectorAll('.filter-select');

        const filteredData = allData.filter(row => {
            let isMatch = true;

            inputs.forEach(input => {
                const col = input.getAttribute('data-col');
                const val = input.value.toLowerCase().trim();
                if (val) {
                    const rowVal = (row[col] !== null && row[col] !== undefined) ? row[col].toString().toLowerCase() : '';
                    if (!rowVal.includes(val)) isMatch = false;
                }
            });

            selects.forEach(select => {
                const col = select.getAttribute('data-col');
                const val = select.value;
                const isDateType = select.getAttribute('data-type') === 'date-only';

                if (val) {
                    const rowVal = (row[col] !== null && row[col] !== undefined) ? row[col].toString() : '';
                    if (isDateType) {
                        if (!rowVal.startsWith(val)) isMatch = false;
                    } else {
                        if (rowVal !== val) isMatch = false;
                    }
                }
            });

            return isMatch;
        });

        // عرض كامل البيانات المجلوبة المتوافقة مع حجم الصفحة المختار
        renderTable(filteredData.slice(0, pageSize));
    }

    document.querySelectorAll('.filter-input').forEach(el => el.addEventListener('keyup', applyFilters));
    document.querySelectorAll('.filter-select').forEach(el => el.addEventListener('change', applyFilters));

    function resetFiltersAndLoad() {
        document.querySelectorAll('.filter-input').forEach(el => el.value = '');
        document.querySelectorAll('.filter-select').forEach(el => el.value = '');
        pageSize = parseInt(document.getElementById('pageSizeSelect').value) || 20;
        loadLogs(1);
    }

    function changePage(step) {
        const newPage = currentPage + step;
        if (newPage >= 1 && newPage <= totalPages) {
            loadLogs(newPage);
        }
    }

    async function deleteRecord(id) {
        if (!confirm('هل أنت متأكد من الحذف؟')) return;
        const res = await fetch(`/api/delete-stat/${id}`, { method: 'DELETE' });
        if (res.ok) {
            allData = allData.filter(i => i.id !== id);
            applyFilters();
            loadLogs(currentPage);
        }
    }

    window.onload = () => loadLogs(1);
</script>
</body>
</html>
